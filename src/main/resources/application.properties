spring.application.name=dirx-ai-demo

# Připojení k PostgreSQL databázi (kterou za chvíli spustíme přes Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/dirx_audit
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# Automatická tvorba/aktualizace tabulek podle Java tříd
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Konfigurace Spring AI pro Gemini
spring.config.import=optional:file:.env[.properties]
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.model=gemini-2.5-flash

#HTTP
spring.mvc.async.request-timeout=5000