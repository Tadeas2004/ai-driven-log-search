<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirx AI Analytics Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: radial-gradient(circle at 50% 0%, #1a1c24 0%, #0f1015 100%);
            min-height: 100vh;
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
    </style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-6xl mx-auto space-y-8">

    <!-- Header -->
    <header class="flex justify-between items-center border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r
                       from-cyan-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">
                dirx-analytics-sandbox
            </h1>
            <p class="text-sm text-gray-400 mt-1">AI-driven orchestration & audit intelligence</p>
        </div>
        <div class="flex items-center space-x-2 bg-gray-900/80 px-3 py-1.5 rounded-full border border-gray-800">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-mono text-gray-400">Gemini 3.5 Flash Connected</span>
        </div>
    </header>

    <!-- AI Query Section -->
    <section class="bg-gray-900/40 backdrop-blur-md p-6 rounded-2xl border border-gray-800/80 shadow-2xl">
        <h2 class="text-lg font-semibold text-gray-200 mb-3">Ask AI Assistant</h2>
        <div class="flex flex-col md:flex-row gap-3">
            <input
                    type="text"
                    id="aiPrompt"
                    placeholder="Enter the filter..."
                    class="flex-1 bg-gray-950/80 border border-gray-800 rounded-xl px-4 py-3 text-sm
                           focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                           transition-all text-gray-100 placeholder-gray-500"
                    onkeydown="if(event.key === 'Enter') executeAiSearch()"
            >
            <button
                    onclick="executeAiSearch()"
                    class="bg-gradient-to-r from-indigo-600 to-purple-600
                           hover:from-indigo-500 hover:to-purple-500
                           text-white font-medium text-sm px-6 py-3 rounded-xl transition-all
                           shadow-lg shadow-indigo-500/10 active:scale-98 cursor-pointer"
            >
                Analyze & Filter
            </button>
        </div>
        <div id="aiFilterStatus"
             class="mt-4 text-xs font-mono text-indigo-400 hidden bg-indigo-950/30
                    border border-indigo-900/50 px-3 py-2 rounded-lg"></div>
    </section>

    <!-- PostgreSQL Data Output -->
    <main class="bg-gray-900/20 rounded-2xl border border-gray-800/80 overflow-hidden shadow-xl">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-gray-900/10">
            <h3 class="font-semibold text-gray-200">PostgreSQL Database Engine Output</h3>
            <!-- Ultra-Premium Luxury Reset Button -->
            <button
                    onclick="loadAllLogs()"
                    class="group relative flex items-center space-x-3 bg-gradient-to-b from-gray-900 via-gray-950 to-gray-950
                   text-base text-gray-200 font-semibold px-6 py-3.5 rounded-xl
                   border border-gray-800 hover:border-cyan-500/40
                   transition-all duration-300 cursor-pointer shadow-2xl
                   hover:shadow-cyan-950/20 hover:-translate-y-0.5 active:translate-y-0 active:scale-98"
            >
                <!-- Subtly glowing back-gradient accent on hover -->
                <div class="absolute inset-0 rounded-xl bg-gradient-to-r from-cyan-500/0 via-indigo-500/10 to-purple-500/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                <span class="text-lg transition-transform duration-500 group-hover:rotate-180">🔄</span>
                <span class="tracking-wide bg-gradient-to-r from-gray-100 to-gray-300 group-hover:from-cyan-400 group-hover:to-indigo-300 bg-clip-text text-transparent transition-colors">
                Reset Filters
            </span>
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-gray-950/40 text-xs font-semibold uppercase tracking-wider
                           text-gray-400 border-b border-gray-800">
                    <th class="py-4 px-6">ID</th>
                    <th class="py-4 px-6">User</th>
                    <th class="py-4 px-6">Event Type</th>
                    <th class="py-4 px-6">Timestamp</th>
                    <th class="py-4 px-6">Location</th>
                    <th class="py-4 px-6">Target Resource</th>
                </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y divide-gray-800/50 text-gray-300">
                </tbody>
            </table>
        </div>

        <div id="emptyState" class="hidden p-12 text-center text-gray-500 text-sm">
            No audit records found matching the active AI criteria.
        </div>
    </main>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadAllLogs();
    });

    function renderTable(logs) {
        const tbody = document.getElementById("tableBody");
        const emptyState = document.getElementById("emptyState");
        tbody.innerHTML = "";

        if (!logs || logs.length === 0) {
            emptyState.classList.remove("hidden");
            return;
        }
        emptyState.classList.add("hidden");

        logs.forEach(log => {
            let badgeColor = "bg-gray-800 text-gray-400";
            if (log.eventType === "DELETE") {
                badgeColor = "bg-rose-500/10 text-rose-400 border border-rose-500/20";
            }
            if (log.eventType === "CREATE") {
                badgeColor = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            }
            if (log.eventType === "UPDATE") {
                badgeColor = "bg-amber-500/10 text-amber-400 border border-amber-500/20";
            }

            tbody.innerHTML += `
                    <tr class="hover:bg-gray-800/20 transition-colors">
                        <td class="py-4 px-6 font-mono text-gray-500">#${log.id}</td>
                        <td class="py-4 px-6 font-medium text-gray-200">${log.username}</td>
                        <td class="py-4 px-6">
                            <span class="px-2.5 py-1 text-xs font-semibold rounded-md ${badgeColor}">
                                ${log.eventType}
                            </span>
                        </td>
                        <td class="py-4 px-6 text-gray-400">${log.eventDate}</td>
                        <td class="py-4 px-6"><span class="text-gray-400">📍</span> ${log.location}</td>
                        <td class="py-4 px-6 font-mono text-xs text-indigo-300">${log.targetResource}</td>
                    </tr>
                `;
        });
    }

    async function loadAllLogs() {
        try {
            const response = await fetch('/api/audit/search?prompt=all');
            const data = await response.json();
            renderTable(data);
            document.getElementById("aiFilterStatus").classList.add("hidden");
            document.getElementById("aiPrompt").value = "";
        } catch (error) {
            console.error("Error loading logs:", error);
        }
    }

    async function executeAiSearch() {
        const promptInput = document.getElementById("aiPrompt");
        const statusDiv = document.getElementById("aiFilterStatus");
        const promptValue = promptInput.value.trim();

        if (!promptValue) return;

        statusDiv.classList.remove("hidden");
        statusDiv.innerText = "⏳ Gemini is computing advanced database criteria from your query...";

        try {
            const response = await fetch(`/api/audit/search?prompt=${encodeURIComponent(promptValue)}`);
            const data = await response.json();
            renderTable(data);
            statusDiv.innerText = `💡 AI filters successfully parsed. Retrieved records: ${data.length}`;
        } catch (error) {
            statusDiv.innerText = "❌ Failed to communicate with the AI orchestration engine.";
            console.error(error);
        }
    }
</script>
</body>
</html>
